<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#090d12">
  <meta name="description" content="Visualizador elegante de PDFs para cifras, partituras e repertórios.">
  <title>CifraView — Visualizador de PDF</title>

  <style>
    :root {
      --columns: 1;
      --page-width: 100%;
      --bg: #090d12;
      --surface: #111722;
      --surface-raised: #161e2b;
      --border: #263244;
      --border-soft: rgba(147, 164, 183, 0.16);
      --text: #f5f7fa;
      --muted: #93a4b7;
      --accent: #5b8cff;
      --accent-hover: #79a2ff;
      --danger: #ef6461;
      --toolbar-height: 54px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button,
    select,
    .drop-zone {
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible,
    select:focus-visible,
    .drop-zone:focus-visible {
      outline: 3px solid rgba(91, 140, 255, 0.34);
      outline-offset: 3px;
    }

    [hidden] {
      display: none !important;
    }

    /* Tela inicial */
    .welcome {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% -15%, rgba(91, 140, 255, 0.24), transparent 42%),
        radial-gradient(circle at 85% 85%, rgba(46, 82, 150, 0.12), transparent 34%),
        var(--bg);
      transition: opacity 220ms ease, transform 220ms ease, filter 220ms ease;
    }

    .welcome::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.22;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.022) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black, transparent 76%);
    }

    .welcome.leaving {
      opacity: 0;
      transform: scale(0.985);
      filter: blur(4px);
    }

    .welcome-card {
      position: relative;
      z-index: 1;
      width: min(100%, 620px);
      padding: clamp(28px, 5vw, 48px);
      border: 1px solid var(--border-soft);
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(22, 30, 43, 0.9), rgba(14, 20, 30, 0.82));
      box-shadow:
        0 36px 100px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.045);
      backdrop-filter: blur(22px);
      text-align: center;
      animation: cardEnter 520ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .brand-mark {
      width: 76px;
      height: 76px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(121, 162, 255, 0.38);
      border-radius: 23px;
      background:
        linear-gradient(145deg, rgba(91, 140, 255, 0.24), rgba(91, 140, 255, 0.08)),
        var(--surface);
      color: #b9ceff;
      font-size: 34px;
      box-shadow:
        0 16px 42px rgba(38, 81, 165, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .welcome h1 {
      margin: 0;
      font-size: clamp(2.35rem, 8vw, 4.25rem);
      line-height: 1;
      letter-spacing: -0.055em;
      font-weight: 760;
    }

    .welcome .subtitle {
      margin: 17px auto 28px;
      max-width: 440px;
      color: var(--muted);
      font-size: clamp(0.96rem, 2.5vw, 1.08rem);
      line-height: 1.65;
    }

    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .drop-zone {
      position: relative;
      isolation: isolate;
      min-height: 184px;
      display: grid;
      place-items: center;
      padding: 28px 24px;
      border: 1px dashed rgba(147, 164, 183, 0.34);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(8, 13, 20, 0.96), rgba(8, 13, 20, 0.9));
      overflow: hidden;
      cursor: pointer;
      transition:
        border-color 180ms ease,
        background 180ms ease,
        transform 160ms ease,
        box-shadow 180ms ease;
    }

    .drop-zone::before {
      content: "";
      position: absolute;
      inset: -38% -14%;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 22% 34%, rgba(91, 140, 255, 0.22), transparent 24%),
        radial-gradient(circle at 78% 70%, rgba(91, 140, 255, 0.12), transparent 20%),
        radial-gradient(circle at 50% 50%, rgba(23, 38, 63, 0.4), transparent 58%);
      filter: blur(42px);
      opacity: 0.95;
      transform: scale(1.08);
      transition: transform 260ms ease, opacity 260ms ease;
    }

    .drop-zone::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.03), transparent 32%, transparent 70%, rgba(255, 255, 255, 0.02));
    }

    .drop-zone:hover,
    .drop-zone.dragging {
      border-color: rgba(91, 140, 255, 0.62);
      background: linear-gradient(180deg, rgba(10, 18, 30, 0.98), rgba(8, 14, 24, 0.94));
      box-shadow:
        0 0 0 4px rgba(91, 140, 255, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 20px 48px rgba(0, 0, 0, 0.34);
      transform: translateY(-2px);
    }

    .drop-zone:hover::before,
    .drop-zone.dragging::before {
      transform: scale(1.14);
      opacity: 1;
    }

    .drop-content {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      gap: 12px;
      text-align: center;
    }

    .drop-icon {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(121, 162, 255, 0.28);
      border-radius: 16px;
      background: linear-gradient(145deg, rgba(91, 140, 255, 0.18), rgba(91, 140, 255, 0.08));
      color: #cfe0ff;
      font-size: 23px;
      box-shadow:
        0 12px 28px rgba(43, 89, 183, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
    }

    .drop-title {
      color: #f5f7fa;
      font-size: 1rem;
      font-weight: 760;
      letter-spacing: -0.02em;
    }

    .drop-text {
      color: #93a4b7;
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .open-button {
      min-height: 48px;
      margin-top: 4px;
      padding: 0 24px;
      border: 1px solid rgba(121, 162, 255, 0.48);
      border-radius: 15px;
      background: linear-gradient(180deg, #7ea8ff, #5b8cff);
      color: #ffffff;
      font-size: 0.98rem;
      font-weight: 780;
      cursor: pointer;
      box-shadow:
        0 16px 32px rgba(43, 89, 183, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      transition:
        transform 130ms ease,
        box-shadow 160ms ease,
        filter 160ms ease;
    }

    .open-button:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
      box-shadow:
        0 18px 36px rgba(43, 89, 183, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .open-button:active,
    .toolbar-button:active,
    .control-button:active {
      transform: scale(0.96);
    }

    .privacy-note {
      margin: 18px 0 0;
      color: #68798e;
      font-size: 0.78rem;
    }

    /* Visualizador */
    .app {
      min-height: 100vh;
      background: var(--bg);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 240ms ease, transform 240ms ease;
    }

    .app.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 30;
      min-height: var(--toolbar-height);
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px max(9px, env(safe-area-inset-right)) 7px max(9px, env(safe-area-inset-left));
      border-bottom: 1px solid var(--border-soft);
      background: rgba(13, 19, 29, 0.92);
      color: var(--text);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.26);
      backdrop-filter: blur(18px) saturate(130%);
      transform: translateY(0);
      transition: transform 240ms ease, opacity 240ms ease;
    }

    .app.stage-mode .toolbar.toolbar-hidden {
      transform: translateY(-110%);
      opacity: 0;
    }

    .toolbar-progress {
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 2px;
      overflow: hidden;
      background: transparent;
      pointer-events: none;
    }

    .toolbar-progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #4b7df2, #83a8ff);
      box-shadow: 0 0 12px rgba(91, 140, 255, 0.8);
      opacity: 0;
      transition: width 180ms ease, opacity 180ms ease;
    }

    .toolbar-progress-bar.active {
      opacity: 1;
    }

    .brand {
      min-width: 0;
      flex: 1;
      padding: 0 4px;
    }

    .brand strong,
    .brand span {
      display: block;
    }

    .brand strong {
      font-size: 0.91rem;
      letter-spacing: -0.02em;
    }

    .brand span {
      margin-top: 1px;
      color: var(--muted);
      font-size: 0.68rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toolbar-button,
    .column-control,
    .step-control {
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(30, 42, 59, 0.9), rgba(19, 28, 41, 0.9));
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    .toolbar-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 11px;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, transform 120ms ease;
    }

    .toolbar-button:hover,
    .column-control:hover,
    .step-control:hover {
      border-color: rgba(91, 140, 255, 0.52);
      background: linear-gradient(180deg, rgba(37, 54, 79, 0.96), rgba(22, 34, 51, 0.96));
    }

    .back-button {
      background: rgba(12, 18, 27, 0.96);
    }

    .stage-button {
      border-color: rgba(91, 140, 255, 0.4);
      color: #c8d8ff;
    }

    .column-control,
    .step-control {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 6px;
      font-size: 0.78rem;
      font-weight: 700;
      transition: border-color 160ms ease, background 160ms ease;
    }

    .control-label {
      color: #aab8c9;
      font-size: 0.68rem;
    }

    .column-control select {
      min-width: 49px;
      min-height: 28px;
      padding: 1px 6px;
      border: 1px solid #34435a;
      border-radius: 7px;
      background: #0c121b;
      color: var(--text);
      cursor: pointer;
    }

    .control-button {
      width: 29px;
      height: 29px;
      display: grid;
      place-items: center;
      border: 1px solid #34435a;
      border-radius: 7px;
      background: #0c121b;
      color: #dce6f5;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease, transform 120ms ease;
    }

    .control-button:hover {
      background: #1e2a3b;
      color: #fff;
    }

    .control-button:disabled,
    .column-control select:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .control-value {
      min-width: 42px;
      color: #d8e3f1;
      text-align: center;
      font-size: 0.72rem;
      font-variant-numeric: tabular-nums;
    }

    .status {
      position: fixed;
      z-index: 20;
      right: 12px;
      bottom: 12px;
      max-width: min(86vw, 420px);
      padding: 7px 10px;
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      background: rgba(14, 21, 31, 0.86);
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .status.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .status.error {
      border-color: rgba(239, 100, 97, 0.45);
      color: #ffaaa8;
    }

    .pdf-viewer {
      width: 100%;
      min-height: calc(100vh - var(--toolbar-height));
      margin: 0;
      padding: 2px;
      display: grid;
      grid-template-columns: repeat(var(--columns), var(--page-width));
      align-items: start;
      justify-content: start;
      gap: 2px;
      overflow-x: auto;
      overscroll-behavior-inline: contain;
      background:
        radial-gradient(circle at 50% 0%, rgba(34, 53, 81, 0.13), transparent 30%),
        var(--bg);
      scrollbar-color: #314059 #0c121b;
      scrollbar-width: thin;
    }

    .pdf-page {
      position: relative;
      width: var(--page-width);
      min-width: var(--page-width);
      display: flex;
      justify-content: center;
      padding: 1px;
      border: 1px solid rgba(38, 50, 68, 0.82);
      border-radius: 3px;
      background: #fff;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.26);
      opacity: 0;
      transform: translateY(8px) scale(0.994);
      animation: pageEnter 250ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes pageEnter {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .page-number {
      position: absolute;
      top: 5px;
      left: 5px;
      z-index: 2;
      padding: 3px 6px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      background: rgba(5, 9, 14, 0.7);
      color: #e6edf7;
      font-size: 0.64rem;
      font-weight: 700;
      pointer-events: none;
      backdrop-filter: blur(8px);
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      background: #fff;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
      }
    }

    @media (max-width: 1150px) {
      .toolbar {
        flex-wrap: wrap;
      }

      .brand {
        flex-basis: 0;
      }

      .toolbar-actions {
        width: 100%;
        flex-wrap: wrap;
      }
    }

    @media (max-width: 640px) {
      .welcome {
        padding: 14px;
      }

      .welcome-card {
        padding: 26px 18px;
        border-radius: 23px;
      }

      .drop-zone {
        min-height: 170px;
        padding: 22px 16px;
      }

      .drop-zone::before {
        inset: -45% -24%;
        filter: blur(36px);
      }

      .toolbar {
        gap: 5px;
        padding: 6px;
      }

      .brand {
        order: 2;
      }

      .back-button {
        order: 1;
      }

      .toolbar-actions {
        order: 3;
        gap: 5px;
      }

      .column-control,
      .step-control {
        flex: 1 1 138px;
        justify-content: space-between;
      }

      .change-button {
        flex: 1 1 calc(50% - 3px);
      }

      .stage-button {
        flex: 1 1 calc(50% - 3px);
      }

      .status {
        right: 8px;
        bottom: 8px;
        font-size: 0.68rem;
      }

      .pdf-viewer {
        padding: 1px;
        gap: 1px;
      }
    }

    @media (orientation: landscape) and (max-height: 650px) {
      .toolbar {
        flex-wrap: nowrap;
        padding: 5px 6px;
      }

      .brand {
        flex: 0 1 138px;
        max-width: 138px;
        order: initial;
      }

      .back-button {
        order: initial;
      }

      .toolbar-actions {
        width: auto;
        flex: 1;
        flex-wrap: nowrap;
        overflow-x: auto;
        order: initial;
        scrollbar-width: none;
      }

      .toolbar-actions::-webkit-scrollbar {
        display: none;
      }

      .control-label {
        display: none;
      }

      .column-control,
      .step-control,
      .change-button,
      .stage-button {
        flex: 0 0 auto;
      }
    }
  </style>
</head>

<body>
  <section id="welcome" class="welcome">
    <div class="welcome-card">
      <div class="brand-mark" aria-hidden="true">♫</div>
      <h1>CifraView</h1>
      <p class="subtitle">Visualize cifras, partituras e repertórios com clareza, em qualquer tamanho de tela.</p>

      <input id="pdf-input" type="file" accept="application/pdf,.pdf">

      <div id="drop-zone" class="drop-zone" role="button" tabindex="0" aria-label="Abrir arquivo PDF">
        <div class="drop-content">
          <div class="drop-icon" aria-hidden="true">♫</div>
          <div class="drop-title">Arraste um PDF para cá</div>
          <div class="drop-text">ou escolha um arquivo no seu aparelho</div>
          <button id="open-pdf-button" class="open-button" type="button">Abrir PDF</button>
        </div>
      </div>

      <p class="privacy-note">Seu arquivo é processado localmente e permanece no aparelho.</p>
    </div>
  </section>

  <section id="app" class="app" hidden>
    <header id="toolbar" class="toolbar">
      <button id="back-button" class="toolbar-button back-button" type="button" aria-label="Voltar para a tela inicial">
        <span aria-hidden="true">←</span>
        Voltar
      </button>

      <div class="brand">
        <strong>CifraView</strong>
        <span id="file-name">Nenhum arquivo</span>
      </div>

      <div class="toolbar-actions">
        <div class="step-control" aria-label="Controle de zoom">
          <span class="control-label">Zoom</span>
          <button id="zoom-out-button" class="control-button" type="button" aria-label="Diminuir zoom">−</button>
          <span id="zoom-value" class="control-value">100%</span>
          <button id="zoom-in-button" class="control-button" type="button" aria-label="Aumentar zoom">+</button>
        </div>

        <div class="step-control" aria-label="Controle de largura das páginas">
          <span class="control-label">Largura</span>
          <button id="width-out-button" class="control-button" type="button" aria-label="Estreitar páginas">−</button>
          <span id="width-value" class="control-value">100%</span>
          <button id="width-in-button" class="control-button" type="button" aria-label="Alargar páginas">+</button>
        </div>

        <label class="column-control" for="column-select">
          <span class="control-label">Colunas</span>
          <select id="column-select" aria-label="Quantidade de páginas lado a lado">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </label>

        <button id="fullscreen-button" class="toolbar-button stage-button" type="button" aria-label="Ativar modo palco">
          <span id="fullscreen-icon" aria-hidden="true">⛶</span>
          <span id="fullscreen-label">Palco</span>
        </button>

        <button id="change-pdf-button" class="toolbar-button change-button" type="button">Trocar PDF</button>
      </div>

      <div class="toolbar-progress" aria-hidden="true">
        <div id="progress-bar" class="toolbar-progress-bar"></div>
      </div>
    </header>

    <div id="status" class="status" role="status" aria-live="polite"></div>
    <main id="pdf-viewer" class="pdf-viewer" aria-label="Páginas do PDF"></main>
  </section>

  <script type="module">
    import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.mjs";

    const welcome = document.getElementById("welcome");
    const app = document.getElementById("app");
    const toolbar = document.getElementById("toolbar");
    const pdfInput = document.getElementById("pdf-input");
    const dropZone = document.getElementById("drop-zone");
    const openPdfButton = document.getElementById("open-pdf-button");
    const backButton = document.getElementById("back-button");
    const changePdfButton = document.getElementById("change-pdf-button");
    const fullscreenButton = document.getElementById("fullscreen-button");
    const fullscreenIcon = document.getElementById("fullscreen-icon");
    const fullscreenLabel = document.getElementById("fullscreen-label");
    const columnSelect = document.getElementById("column-select");
    const zoomOutButton = document.getElementById("zoom-out-button");
    const zoomInButton = document.getElementById("zoom-in-button");
    const zoomValue = document.getElementById("zoom-value");
    const widthOutButton = document.getElementById("width-out-button");
    const widthInButton = document.getElementById("width-in-button");
    const widthValue = document.getElementById("width-value");
    const fileName = document.getElementById("file-name");
    const status = document.getElementById("status");
    const progressBar = document.getElementById("progress-bar");
    const pdfViewer = document.getElementById("pdf-viewer");

    const MIN_ZOOM = 0.5;
    const MAX_ZOOM = 2;
    const STEP = 0.1;
    const MIN_WIDTH = 0.7;
    const MAX_WIDTH = 1.8;

    let currentDocument = null;
    let currentColumns = 1;
    let currentZoom = 1;
    let currentWidth = 1;
    let renderVersion = 0;
    let resizeTimer = null;
    let statusTimer = null;
    let toolbarTimer = null;

    const savedColumns = Number.parseInt(localStorage.getItem("cifraview-columns"), 10);
    const savedZoom = Number.parseFloat(localStorage.getItem("cifraview-zoom"));
    const savedWidth = Number.parseFloat(localStorage.getItem("cifraview-width"));

    applyColumns(Number.isInteger(savedColumns) ? savedColumns : (window.innerWidth <= 640 ? 1 : 2), false);
    applyZoom(Number.isFinite(savedZoom) ? savedZoom : 1, false);
    applyWidth(Number.isFinite(savedWidth) ? savedWidth : 1, false);

    openPdfButton.addEventListener("click", (event) => {
      event.stopPropagation();
      pdfInput.click();
    });

    dropZone.addEventListener("click", () => pdfInput.click());
    dropZone.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        pdfInput.click();
      }
    });

    ["dragenter", "dragover"].forEach((eventName) => {
      dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropZone.classList.add("dragging");
      });
    });

    ["dragleave", "drop"].forEach((eventName) => {
      dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropZone.classList.remove("dragging");
      });
    });

    dropZone.addEventListener("drop", async (event) => {
      const file = event.dataTransfer?.files?.[0];
      if (file) await handleFile(file);
    });

    pdfInput.addEventListener("change", async () => {
      const file = pdfInput.files?.[0];
      if (file) await handleFile(file);
      pdfInput.value = "";
    });

    changePdfButton.addEventListener("click", () => pdfInput.click());
    backButton.addEventListener("click", resetApp);
    fullscreenButton.addEventListener("click", toggleFullscreen);

    columnSelect.addEventListener("change", async () => {
      applyColumns(Number.parseInt(columnSelect.value, 10), false);
      await renderAllPages();
    });

    zoomOutButton.addEventListener("click", async () => {
      applyZoom(currentZoom - STEP, false);
      await renderAllPages();
    });

    zoomInButton.addEventListener("click", async () => {
      applyZoom(currentZoom + STEP, false);
      await renderAllPages();
    });

    widthOutButton.addEventListener("click", async () => {
      applyWidth(currentWidth - STEP, false);
      await renderAllPages();
    });

    widthInButton.addEventListener("click", async () => {
      applyWidth(currentWidth + STEP, false);
      await renderAllPages();
    });

    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (currentDocument) renderAllPages();
      }, 250);
    });

    document.addEventListener("fullscreenchange", updateFullscreenState);
    app.addEventListener("pointermove", revealToolbar);
    app.addEventListener("touchstart", revealToolbar, { passive: true });

    document.addEventListener("keydown", (event) => {
      if (!currentDocument) return;

      if (event.key.toLowerCase() === "f") {
        event.preventDefault();
        toggleFullscreen();
      }

      if (event.key === "+" || event.key === "=") {
        event.preventDefault();
        applyZoom(currentZoom + STEP);
      }

      if (event.key === "-") {
        event.preventDefault();
        applyZoom(currentZoom - STEP);
      }
    });

    async function handleFile(file) {
      if (file.type !== "application/pdf" && !file.name.toLowerCase().endsWith(".pdf")) {
        showError("Selecione um arquivo PDF válido.");
        return;
      }

      await loadPdf(file);
    }

    function applyColumns(value, rerender = true) {
      currentColumns = Math.min(6, Math.max(1, Number(value) || 1));
      document.documentElement.style.setProperty("--columns", currentColumns);
      columnSelect.value = String(currentColumns);
      localStorage.setItem("cifraview-columns", String(currentColumns));
      if (rerender && currentDocument) renderAllPages();
    }

    function applyZoom(value, rerender = true) {
      currentZoom = Math.round(Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, Number(value) || 1)) * 10) / 10;
      zoomValue.textContent = `${Math.round(currentZoom * 100)}%`;
      localStorage.setItem("cifraview-zoom", String(currentZoom));
      updateDisabledControls(false);
      if (rerender && currentDocument) renderAllPages();
    }

    function applyWidth(value, rerender = true) {
      currentWidth = Math.round(Math.min(MAX_WIDTH, Math.max(MIN_WIDTH, Number(value) || 1)) * 10) / 10;
      widthValue.textContent = `${Math.round(currentWidth * 100)}%`;
      localStorage.setItem("cifraview-width", String(currentWidth));
      updateDisabledControls(false);
      if (rerender && currentDocument) renderAllPages();
    }

    function calculatePageWidth() {
      const styles = getComputedStyle(pdfViewer);
      const horizontalPadding = (parseFloat(styles.paddingLeft) || 0) + (parseFloat(styles.paddingRight) || 0);
      const gap = parseFloat(styles.columnGap) || 0;
      const innerWidth = Math.max(280, pdfViewer.clientWidth - horizontalPadding);
      const baseWidth = Math.max(120, (innerWidth - gap * Math.max(0, currentColumns - 1)) / currentColumns);
      const pageWidth = Math.min(1800, Math.max(100, baseWidth * currentWidth * currentZoom));

      document.documentElement.style.setProperty("--page-width", `${pageWidth}px`);
      pdfViewer.style.justifyContent = currentWidth * currentZoom < 1 ? "center" : "start";
      return pageWidth;
    }

    async function openViewer() {
      welcome.classList.add("leaving");
      await new Promise((resolve) => setTimeout(resolve, 180));
      welcome.hidden = true;
      welcome.classList.remove("leaving");
      app.hidden = false;
      requestAnimationFrame(() => app.classList.add("visible"));
    }

    async function loadPdf(file) {
      try {
        renderVersion += 1;
        await openViewer();
        pdfViewer.replaceChildren();
        fileName.textContent = file.name;
        showStatus("Carregando PDF…", true);
        setProgress(4, true);

        if (currentDocument) {
          await currentDocument.destroy();
          currentDocument = null;
        }

        const data = new Uint8Array(await file.arrayBuffer());
        currentDocument = await pdfjsLib.getDocument({ data }).promise;
        await renderAllPages();
      } catch (error) {
        console.error(error);
        showError("Não foi possível abrir este PDF.");
      }
    }

    async function renderAllPages() {
      if (!currentDocument) return;

      const version = ++renderVersion;
      const pageWidth = calculatePageWidth();
      updateDisabledControls(true);
      pdfViewer.replaceChildren();
      setProgress(0, true);
      showStatus(`Preparando ${currentDocument.numPages} página${currentDocument.numPages === 1 ? "" : "s"}…`, true);

      try {
        for (let pageNumber = 1; pageNumber <= currentDocument.numPages; pageNumber += 1) {
          if (version !== renderVersion) return;

          await renderPage(currentDocument, pageNumber, pageWidth);
          const progress = Math.round((pageNumber / currentDocument.numPages) * 100);
          setProgress(progress, true);
          showStatus(`Renderizando ${pageNumber} de ${currentDocument.numPages}…`, true);
        }

        if (version === renderVersion) {
          setProgress(100, true);
          showStatus(`${currentDocument.numPages} página${currentDocument.numPages === 1 ? "" : "s"} · zoom ${Math.round(currentZoom * 100)}% · largura ${Math.round(currentWidth * 100)}%`, false);
          setTimeout(() => setProgress(0, false), 450);
        }
      } catch (error) {
        if (version !== renderVersion) return;
        console.error(error);
        showError("Não foi possível renderizar este PDF.");
      } finally {
        if (version === renderVersion) updateDisabledControls(false);
      }
    }

    async function renderPage(pdfDocument, pageNumber, pageWidth) {
      const page = await pdfDocument.getPage(pageNumber);
      const initialViewport = page.getViewport({ scale: 1 });
      const viewport = page.getViewport({ scale: Math.max(80, pageWidth - 2) / initialViewport.width });
      const outputScale = Math.min(window.devicePixelRatio || 1, 2);
      const pageContainer = document.createElement("article");
      const pageLabel = document.createElement("span");
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d", { alpha: false });

      pageContainer.className = "pdf-page";
      pageContainer.style.animationDelay = `${Math.min(pageNumber - 1, 12) * 24}ms`;
      pageContainer.setAttribute("aria-label", `Página ${pageNumber}`);
      pageLabel.className = "page-number";
      pageLabel.textContent = `Página ${pageNumber}`;

      canvas.width = Math.floor(viewport.width * outputScale);
      canvas.height = Math.floor(viewport.height * outputScale);
      canvas.style.width = `${Math.floor(viewport.width)}px`;
      canvas.style.height = `${Math.floor(viewport.height)}px`;

      pageContainer.append(pageLabel, canvas);
      pdfViewer.appendChild(pageContainer);

      await page.render({
        canvasContext: context,
        viewport,
        transform: outputScale === 1 ? null : [outputScale, 0, 0, outputScale, 0, 0],
        background: "rgb(255, 255, 255)"
      }).promise;

      page.cleanup();
    }

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await app.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (error) {
        console.error(error);
        showError("A tela cheia não está disponível neste navegador.");
      }
    }

    function updateFullscreenState() {
      const active = Boolean(document.fullscreenElement);
      app.classList.toggle("stage-mode", active);
      fullscreenIcon.textContent = active ? "↙" : "⛶";
      fullscreenLabel.textContent = active ? "Sair" : "Palco";
      toolbar.classList.remove("toolbar-hidden");

      clearTimeout(toolbarTimer);
      if (active) scheduleToolbarHide();
    }

    function revealToolbar() {
      if (!document.fullscreenElement) return;
      toolbar.classList.remove("toolbar-hidden");
      scheduleToolbarHide();
    }

    function scheduleToolbarHide() {
      clearTimeout(toolbarTimer);
      toolbarTimer = setTimeout(() => {
        if (document.fullscreenElement) toolbar.classList.add("toolbar-hidden");
      }, 2800);
    }

    function setProgress(value, active) {
      progressBar.style.width = `${Math.min(100, Math.max(0, value))}%`;
      progressBar.classList.toggle("active", active);
    }

    function showStatus(message, keepVisible) {
      clearTimeout(statusTimer);
      status.classList.remove("error");
      status.textContent = message;
      status.classList.add("visible");

      if (!keepVisible) {
        statusTimer = setTimeout(() => status.classList.remove("visible"), 2200);
      }
    }

    async function resetApp() {
      renderVersion += 1;
      updateDisabledControls(true);

      if (document.fullscreenElement) {
        try {
          await document.exitFullscreen();
        } catch (error) {
          console.warn("Não foi possível sair da tela cheia.", error);
        }
      }

      try {
        if (currentDocument) await currentDocument.destroy();
      } catch (error) {
        console.warn("Falha ao encerrar o PDF atual.", error);
      }

      currentDocument = null;
      pdfViewer.replaceChildren();
      status.textContent = "";
      status.classList.remove("visible", "error");
      setProgress(0, false);
      fileName.textContent = "Nenhum arquivo";
      pdfInput.value = "";
      app.classList.remove("visible", "stage-mode");
      toolbar.classList.remove("toolbar-hidden");
      app.hidden = true;
      welcome.hidden = false;
      updateDisabledControls(false);
      window.scrollTo({ top: 0, behavior: "instant" });
    }

    function updateDisabledControls(rendering) {
      columnSelect.disabled = rendering;
      zoomOutButton.disabled = rendering || currentZoom <= MIN_ZOOM;
      zoomInButton.disabled = rendering || currentZoom >= MAX_ZOOM;
      widthOutButton.disabled = rendering || currentWidth <= MIN_WIDTH;
      widthInButton.disabled = rendering || currentWidth >= MAX_WIDTH;
    }

    function showError(message) {
      app.hidden = false;
      welcome.hidden = true;
      app.classList.add("visible");
      status.classList.add("error", "visible");
      status.textContent = message;
      setProgress(0, false);
      updateDisabledControls(false);
      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => status.classList.remove("visible"), 3500);
    }
  </script>
</body>
</html>
