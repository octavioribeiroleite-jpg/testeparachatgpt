<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto com o ChatGPT</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f5;
      color: #18181b;
    }

    main {
      max-width: 760px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 4.5rem);
      line-height: 1.1;
    }

    p {
      margin: 20px 0 0;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      line-height: 1.5;
      color: #52525b;
    }
  </style>
</head>
<body>
  <main>
    <h1>Vamos iniciar?</h1>
    <p>Esse vai ser um projeto que vou fazer com o ChatGPT.</p>
  </main>
</body>
</html>
