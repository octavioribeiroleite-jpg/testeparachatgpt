<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="Visualizador de PDFs para cifras, partituras e repertórios.">
  <title>CifraView — Visualizador de PDF</title>
  <style>
    :root {
      --columns: 1;
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #e5e7eb;
      color: #111827;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .welcome {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.14), transparent 36%),
        #f8fafc;
    }

    .welcome-card {
      width: min(100%, 560px);
      padding: clamp(28px, 6vw, 52px);
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      background: #eff6ff;
      color: #2563eb;
      font-size: 34px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3.4rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .welcome-card p {
      margin: 18px auto 28px;
      max-width: 420px;
      color: #64748b;
      font-size: 1rem;
      line-height: 1.6;
    }

    .primary-button,
    .secondary-button {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease;
    }

    .primary-button {
      width: 100%;
      min-height: 56px;
      border: 0;
      background: #111827;
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.2);
    }

    .primary-button:hover,
    .secondary-button:hover {
      transform: translateY(-1px);
    }

    .primary-button:hover {
      background: #1f2937;
    }

    .privacy-note {
      margin: 20px 0 0 !important;
      color: #94a3b8 !important;
      font-size: 0.8rem !important;
    }

    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .app {
      min-height: 100vh;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(17, 24, 39, 0.96);
      color: #ffffff;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.18);
    }

    .brand {
      min-width: 0;
      flex: 1;
    }

    .brand strong,
    .brand span {
      display: block;
    }

    .brand strong {
      font-size: 1rem;
    }

    .brand span {
      margin-top: 2px;
      color: #cbd5e1;
      font-size: 0.78rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .column-control {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      border: 1px solid #4b5563;
      border-radius: 12px;
      background: #1f2937;
      color: #e5e7eb;
      font-size: 0.88rem;
      font-weight: 700;
    }

    .column-control select {
      min-width: 58px;
      min-height: 30px;
      padding: 2px 8px;
      border: 1px solid #6b7280;
      border-radius: 8px;
      background: #111827;
      color: #ffffff;
      cursor: pointer;
    }

    .secondary-button {
      flex: 0 0 auto;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid #4b5563;
      background: #1f2937;
      color: #ffffff;
    }

    .status {
      padding: 16px;
      text-align: center;
      color: #475569;
      font-weight: 600;
    }

    .status.error {
      color: #b91c1c;
    }

    .pdf-viewer {
      width: 100%;
      max-width: 1800px;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-columns: repeat(var(--columns), minmax(0, 1fr));
      align-items: start;
      gap: 18px;
    }

    .pdf-page {
      position: relative;
      min-width: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 10px;
      border-radius: 12px;
      background: #cbd5e1;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.16);
    }

    .page-number {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 2;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.78);
      color: #ffffff;
      font-size: 0.72rem;
      font-weight: 700;
      pointer-events: none;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      background: #ffffff;
      box-shadow: 0 3px 12px rgba(15, 23, 42, 0.18);
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 640px) {
      .welcome {
        padding: 16px;
      }

      .welcome-card {
        border-radius: 20px;
      }

      .toolbar {
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px;
      }

      .brand {
        flex-basis: 100%;
      }

      .toolbar-actions {
        width: 100%;
      }

      .column-control {
        flex: 1;
        justify-content: space-between;
      }

      .secondary-button {
        padding: 0 11px;
        font-size: 0.88rem;
      }

      .pdf-viewer {
        padding: 10px;
        gap: 10px;
      }

      .pdf-page {
        padding: 5px;
        border-radius: 8px;
      }

      .page-number {
        top: 10px;
        left: 10px;
      }
    }
  </style>
</head>
<body>
  <section id="welcome" class="welcome">
    <div class="welcome-card">
      <div class="icon" aria-hidden="true">♫</div>
      <h1>CifraView</h1>
      <p>Abra uma cifra ou partitura em PDF para visualizar todas as páginas.</p>

      <input id="pdf-input" type="file" accept="application/pdf,.pdf">
      <button id="open-pdf-button" class="primary-button" type="button">
        <span aria-hidden="true">📄</span>
        Abrir PDF
      </button>

      <p class="privacy-note">O arquivo permanece no seu aparelho.</p>
    </div>
  </section>

  <section id="app" class="app" hidden>
    <header class="toolbar">
      <div class="brand">
        <strong>CifraView</strong>
        <span id="file-name">Nenhum arquivo</span>
      </div>

      <div class="toolbar-actions">
        <label class="column-control" for="column-select">
          <span>Colunas</span>
          <select id="column-select" aria-label="Quantidade de páginas lado a lado">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </label>

        <button id="change-pdf-button" class="secondary-button" type="button">
          Trocar PDF
        </button>
      </div>
    </header>

    <div id="status" class="status" role="status" aria-live="polite"></div>
    <main id="pdf-viewer" class="pdf-viewer" aria-label="Páginas do PDF"></main>
  </section>

  <script type="module">
    import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.mjs";

    const welcome = document.getElementById("welcome");
    const app = document.getElementById("app");
    const pdfInput = document.getElementById("pdf-input");
    const openPdfButton = document.getElementById("open-pdf-button");
    const changePdfButton = document.getElementById("change-pdf-button");
    const columnSelect = document.getElementById("column-select");
    const fileName = document.getElementById("file-name");
    const status = document.getElementById("status");
    const pdfViewer = document.getElementById("pdf-viewer");

    let currentDocument = null;

    const savedColumns = Number.parseInt(localStorage.getItem("cifraview-columns"), 10);
    const defaultColumns = window.innerWidth <= 640 ? 1 : 2;
    applyColumns(Number.isInteger(savedColumns) ? savedColumns : defaultColumns);

    openPdfButton.addEventListener("click", () => pdfInput.click());
    changePdfButton.addEventListener("click", () => pdfInput.click());

    columnSelect.addEventListener("change", () => {
      applyColumns(Number.parseInt(columnSelect.value, 10));
    });

    pdfInput.addEventListener("change", async () => {
      const file = pdfInput.files?.[0];

      if (!file) return;

      if (file.type !== "application/pdf" && !file.name.toLowerCase().endsWith(".pdf")) {
        showError("Selecione um arquivo PDF válido.");
        pdfInput.value = "";
        return;
      }

      await loadPdf(file);
      pdfInput.value = "";
    });

    function applyColumns(value) {
      const columns = Math.min(6, Math.max(1, Number(value) || 1));
      document.documentElement.style.setProperty("--columns", columns);
      columnSelect.value = String(columns);
      localStorage.setItem("cifraview-columns", String(columns));
    }

    async function loadPdf(file) {
      try {
        welcome.hidden = true;
        app.hidden = false;
        pdfViewer.replaceChildren();
        status.classList.remove("error");
        status.textContent = "Carregando PDF...";
        fileName.textContent = file.name;

        if (currentDocument) {
          await currentDocument.destroy();
          currentDocument = null;
        }

        const fileData = new Uint8Array(await file.arrayBuffer());
        currentDocument = await pdfjsLib.getDocument({ data: fileData }).promise;

        status.textContent = `Renderizando 0 de ${currentDocument.numPages} páginas...`;

        for (let pageNumber = 1; pageNumber <= currentDocument.numPages; pageNumber += 1) {
          await renderPage(currentDocument, pageNumber);
          status.textContent = `Renderizando ${pageNumber} de ${currentDocument.numPages} páginas...`;
        }

        status.textContent = `${currentDocument.numPages} página${currentDocument.numPages === 1 ? "" : "s"} carregada${currentDocument.numPages === 1 ? "" : "s"}.`;
      } catch (error) {
        console.error(error);
        showError("Não foi possível abrir este PDF. Tente outro arquivo.");
      }
    }

    async function renderPage(pdfDocument, pageNumber) {
      const page = await pdfDocument.getPage(pageNumber);
      const initialViewport = page.getViewport({ scale: 1 });
      const availableWidth = Math.max(280, Math.min(pdfViewer.clientWidth - 36, 900));
      const scale = availableWidth / initialViewport.width;
      const viewport = page.getViewport({ scale });
      const outputScale = Math.min(window.devicePixelRatio || 1, 2);

      const pageContainer = document.createElement("article");
      pageContainer.className = "pdf-page";
      pageContainer.setAttribute("aria-label", `Página ${pageNumber}`);

      const pageLabel = document.createElement("span");
      pageLabel.className = "page-number";
      pageLabel.textContent = `Página ${pageNumber}`;

      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d", { alpha: false });

      canvas.width = Math.floor(viewport.width * outputScale);
      canvas.height = Math.floor(viewport.height * outputScale);
      canvas.style.width = `${Math.floor(viewport.width)}px`;
      canvas.style.height = `${Math.floor(viewport.height)}px`;

      pageContainer.append(pageLabel, canvas);
      pdfViewer.appendChild(pageContainer);

      await page.render({
        canvasContext: context,
        viewport,
        transform: outputScale === 1 ? null : [outputScale, 0, 0, outputScale, 0, 0],
        background: "rgb(255, 255, 255)"
      }).promise;

      page.cleanup();
    }

    function showError(message) {
      app.hidden = false;
      welcome.hidden = true;
      status.classList.add("error");
      status.textContent = message;
    }
  </script>
</body>
</html>
