<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="Visualizador de PDFs para cifras, partituras e repertórios.">
  <title>CifraView — Abrir PDF</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.14), transparent 36%),
        #f8fafc;
      color: #111827;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 560px);
      padding: clamp(28px, 6vw, 52px);
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      background: #eff6ff;
      color: #2563eb;
      font-size: 34px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3.4rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    p {
      margin: 18px auto 28px;
      max-width: 420px;
      color: #64748b;
      font-size: 1rem;
      line-height: 1.6;
    }

    .open-button {
      width: 100%;
      min-height: 56px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 0;
      border-radius: 14px;
      background: #111827;
      color: #ffffff;
      font: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.2);
    }

    .open-button:hover {
      background: #1f2937;
      transform: translateY(-1px);
    }

    .open-button:active {
      transform: translateY(0);
    }

    .open-button:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.35);
      outline-offset: 4px;
    }

    .file-status {
      min-height: 24px;
      margin-top: 16px;
      color: #475569;
      font-size: 0.92rem;
      overflow-wrap: anywhere;
    }

    .privacy-note {
      margin: 20px 0 0;
      color: #94a3b8;
      font-size: 0.8rem;
    }

    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 480px) {
      main {
        padding: 16px;
      }

      .card {
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-labelledby="page-title">
      <div class="icon" aria-hidden="true">♫</div>
      <h1 id="page-title">CifraView</h1>
      <p>Abra uma cifra ou partitura em PDF para começar.</p>

      <input id="pdf-input" type="file" accept="application/pdf,.pdf">
      <button id="open-pdf-button" class="open-button" type="button">
        <span aria-hidden="true">📄</span>
        Abrir PDF
      </button>

      <div id="file-status" class="file-status" aria-live="polite"></div>
      <p class="privacy-note">O arquivo permanece no seu aparelho.</p>
    </section>
  </main>

  <script>
    const pdfInput = document.getElementById("pdf-input");
    const openPdfButton = document.getElementById("open-pdf-button");
    const fileStatus = document.getElementById("file-status");

    openPdfButton.addEventListener("click", () => pdfInput.click());

    pdfInput.addEventListener("change", () => {
      const file = pdfInput.files?.[0];

      if (!file) {
        fileStatus.textContent = "";
        return;
      }

      if (file.type !== "application/pdf" && !file.name.toLowerCase().endsWith(".pdf")) {
        fileStatus.textContent = "Selecione um arquivo PDF válido.";
        pdfInput.value = "";
        return;
      }

      fileStatus.textContent = `Arquivo selecionado: ${file.name}`;
    });
  </script>
</body>
</html>
