<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="Visualizador de PDFs para cifras, partituras e repertórios.">
  <title>CifraView — Visualizador de PDF</title>
  <style>
    :root {
      --columns: 1;
      --page-width: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color-scheme: light;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #e5e7eb;
      color: #111827;
    }

    button, input, select { font: inherit; }
    [hidden] { display: none !important; }

    .welcome {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(59, 130, 246, 0.14), transparent 36%), #f8fafc;
    }

    .welcome-card {
      width: min(100%, 560px);
      padding: clamp(28px, 6vw, 52px);
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      background: #eff6ff;
      color: #2563eb;
      font-size: 34px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3.4rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .welcome-card p {
      margin: 18px auto 28px;
      max-width: 420px;
      color: #64748b;
      line-height: 1.6;
    }

    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    .primary-button,
    .toolbar-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary-button {
      width: 100%;
      min-height: 56px;
      gap: 10px;
      border: 0;
      background: #111827;
      color: #fff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.2);
    }

    .privacy-note {
      margin: 20px 0 0 !important;
      color: #94a3b8 !important;
      font-size: 0.8rem !important;
    }

    .app { min-height: 100vh; }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(17, 24, 39, 0.97);
      color: #fff;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.2);
    }

    .brand {
      min-width: 0;
      flex: 1;
    }

    .brand strong,
    .brand span { display: block; }

    .brand span {
      margin-top: 2px;
      color: #cbd5e1;
      font-size: 0.72rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .toolbar-button {
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid #4b5563;
      background: #1f2937;
      color: #fff;
      white-space: nowrap;
    }

    .back-button {
      gap: 6px;
      background: #111827;
    }

    .column-control,
    .step-control {
      min-height: 38px;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 6px;
      border: 1px solid #4b5563;
      border-radius: 10px;
      background: #1f2937;
      color: #e5e7eb;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .control-label {
      color: #d1d5db;
      font-size: 0.72rem;
    }

    .column-control select {
      min-width: 52px;
      min-height: 28px;
      padding: 2px 7px;
      border: 1px solid #6b7280;
      border-radius: 7px;
      background: #111827;
      color: #fff;
    }

    .control-button {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 1px solid #6b7280;
      border-radius: 7px;
      background: #111827;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
    }

    .control-button:disabled,
    .column-control select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .control-value {
      min-width: 44px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .status {
      padding: 4px 7px;
      text-align: center;
      color: #475569;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .status.error { color: #b91c1c; }

    .pdf-viewer {
      width: 100%;
      margin: 0;
      padding: 1px;
      display: grid;
      grid-template-columns: repeat(var(--columns), var(--page-width));
      align-items: start;
      justify-content: start;
      gap: 1px;
      overflow-x: auto;
      overscroll-behavior-inline: contain;
    }

    .pdf-page {
      position: relative;
      width: var(--page-width);
      min-width: var(--page-width);
      display: flex;
      justify-content: center;
      padding: 1px;
      background: #cbd5e1;
    }

    .page-number {
      position: absolute;
      top: 4px;
      left: 4px;
      z-index: 2;
      padding: 3px 6px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.78);
      color: #fff;
      font-size: 0.66rem;
      font-weight: 700;
      pointer-events: none;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      background: #fff;
    }

    @media (max-width: 1100px) {
      .toolbar { flex-wrap: wrap; }
      .brand { flex-basis: 0; }
      .toolbar-actions {
        width: 100%;
        flex-wrap: wrap;
      }
    }

    @media (max-width: 640px) {
      .welcome { padding: 16px; }
      .toolbar { gap: 6px; padding: 7px; }
      .brand { order: 2; }
      .back-button { order: 1; }
      .toolbar-actions { order: 3; gap: 5px; }
      .column-control,
      .step-control { flex: 1 1 140px; justify-content: space-between; }
      .change-button { flex: 1 1 100%; }
      .status { padding: 2px 5px; font-size: 0.7rem; }
    }

    @media (orientation: landscape) and (max-height: 620px) {
      .toolbar {
        flex-wrap: nowrap;
        padding: 5px 7px;
      }

      .brand {
        flex: 0 1 150px;
        max-width: 150px;
        order: initial;
      }

      .back-button { order: initial; }

      .toolbar-actions {
        width: auto;
        flex: 1;
        flex-wrap: nowrap;
        overflow-x: auto;
        order: initial;
      }

      .control-label { display: none; }
      .column-control,
      .step-control { flex: 0 0 auto; }
      .change-button { flex: 0 0 auto; }
    }
  </style>
</head>
<body>
  <section id="welcome" class="welcome">
    <div class="welcome-card">
      <div class="icon" aria-hidden="true">♫</div>
      <h1>CifraView</h1>
      <p>Abra uma cifra ou partitura em PDF para visualizar todas as páginas.</p>
      <input id="pdf-input" type="file" accept="application/pdf,.pdf">
      <button id="open-pdf-button" class="primary-button" type="button">
        <span aria-hidden="true">📄</span>
        Abrir PDF
      </button>
      <p class="privacy-note">O arquivo permanece no seu aparelho.</p>
    </div>
  </section>

  <section id="app" class="app" hidden>
    <header class="toolbar">
      <button id="back-button" class="toolbar-button back-button" type="button" aria-label="Voltar para a tela inicial">
        <span aria-hidden="true">←</span>
        Voltar
      </button>

      <div class="brand">
        <strong>CifraView</strong>
        <span id="file-name">Nenhum arquivo</span>
      </div>

      <div class="toolbar-actions">
        <div class="step-control" aria-label="Controle de zoom">
          <span class="control-label">Zoom</span>
          <button id="zoom-out-button" class="control-button" type="button" aria-label="Diminuir zoom">−</button>
          <span id="zoom-value" class="control-value">100%</span>
          <button id="zoom-in-button" class="control-button" type="button" aria-label="Aumentar zoom">+</button>
        </div>

        <div class="step-control" aria-label="Controle de largura das páginas">
          <span class="control-label">Largura</span>
          <button id="width-out-button" class="control-button" type="button" aria-label="Estreitar páginas">−</button>
          <span id="width-value" class="control-value">100%</span>
          <button id="width-in-button" class="control-button" type="button" aria-label="Alargar páginas">+</button>
        </div>

        <label class="column-control" for="column-select">
          <span class="control-label">Colunas</span>
          <select id="column-select" aria-label="Quantidade de páginas lado a lado">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </label>

        <button id="change-pdf-button" class="toolbar-button change-button" type="button">Trocar PDF</button>
      </div>
    </header>

    <div id="status" class="status" role="status" aria-live="polite"></div>
    <main id="pdf-viewer" class="pdf-viewer" aria-label="Páginas do PDF"></main>
  </section>

  <script type="module">
    import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.mjs";

    const welcome = document.getElementById("welcome");
    const app = document.getElementById("app");
    const pdfInput = document.getElementById("pdf-input");
    const openPdfButton = document.getElementById("open-pdf-button");
    const backButton = document.getElementById("back-button");
    const changePdfButton = document.getElementById("change-pdf-button");
    const columnSelect = document.getElementById("column-select");
    const zoomOutButton = document.getElementById("zoom-out-button");
    const zoomInButton = document.getElementById("zoom-in-button");
    const zoomValue = document.getElementById("zoom-value");
    const widthOutButton = document.getElementById("width-out-button");
    const widthInButton = document.getElementById("width-in-button");
    const widthValue = document.getElementById("width-value");
    const fileName = document.getElementById("file-name");
    const status = document.getElementById("status");
    const pdfViewer = document.getElementById("pdf-viewer");

    const MIN_ZOOM = 0.5;
    const MAX_ZOOM = 2;
    const STEP = 0.1;
    const MIN_WIDTH = 0.7;
    const MAX_WIDTH = 1.8;

    let currentDocument = null;
    let currentColumns = 1;
    let currentZoom = 1;
    let currentWidth = 1;
    let renderVersion = 0;
    let resizeTimer = null;

    const savedColumns = Number.parseInt(localStorage.getItem("cifraview-columns"), 10);
    const savedZoom = Number.parseFloat(localStorage.getItem("cifraview-zoom"));
    const savedWidth = Number.parseFloat(localStorage.getItem("cifraview-width"));

    applyColumns(Number.isInteger(savedColumns) ? savedColumns : (window.innerWidth <= 640 ? 1 : 2), false);
    applyZoom(Number.isFinite(savedZoom) ? savedZoom : 1, false);
    applyWidth(Number.isFinite(savedWidth) ? savedWidth : 1, false);

    openPdfButton.addEventListener("click", () => pdfInput.click());
    changePdfButton.addEventListener("click", () => pdfInput.click());
    backButton.addEventListener("click", resetApp);

    columnSelect.addEventListener("change", async () => {
      applyColumns(Number.parseInt(columnSelect.value, 10), false);
      await renderAllPages();
    });

    zoomOutButton.addEventListener("click", async () => {
      applyZoom(currentZoom - STEP, false);
      await renderAllPages();
    });

    zoomInButton.addEventListener("click", async () => {
      applyZoom(currentZoom + STEP, false);
      await renderAllPages();
    });

    widthOutButton.addEventListener("click", async () => {
      applyWidth(currentWidth - STEP, false);
      await renderAllPages();
    });

    widthInButton.addEventListener("click", async () => {
      applyWidth(currentWidth + STEP, false);
      await renderAllPages();
    });

    pdfInput.addEventListener("change", async () => {
      const file = pdfInput.files?.[0];
      if (!file) return;

      if (file.type !== "application/pdf" && !file.name.toLowerCase().endsWith(".pdf")) {
        showError("Selecione um arquivo PDF válido.");
        pdfInput.value = "";
        return;
      }

      await loadPdf(file);
      pdfInput.value = "";
    });

    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (currentDocument) renderAllPages();
      }, 250);
    });

    function applyColumns(value, rerender = true) {
      currentColumns = Math.min(6, Math.max(1, Number(value) || 1));
      document.documentElement.style.setProperty("--columns", currentColumns);
      columnSelect.value = String(currentColumns);
      localStorage.setItem("cifraview-columns", String(currentColumns));
      if (rerender && currentDocument) renderAllPages();
    }

    function applyZoom(value, rerender = true) {
      currentZoom = Math.round(Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, Number(value) || 1)) * 10) / 10;
      zoomValue.textContent = `${Math.round(currentZoom * 100)}%`;
      localStorage.setItem("cifraview-zoom", String(currentZoom));
      updateDisabledControls(false);
      if (rerender && currentDocument) renderAllPages();
    }

    function applyWidth(value, rerender = true) {
      currentWidth = Math.round(Math.min(MAX_WIDTH, Math.max(MIN_WIDTH, Number(value) || 1)) * 10) / 10;
      widthValue.textContent = `${Math.round(currentWidth * 100)}%`;
      localStorage.setItem("cifraview-width", String(currentWidth));
      updateDisabledControls(false);
      if (rerender && currentDocument) renderAllPages();
    }

    function calculatePageWidth() {
      const styles = getComputedStyle(pdfViewer);
      const horizontalPadding = (parseFloat(styles.paddingLeft) || 0) + (parseFloat(styles.paddingRight) || 0);
      const gap = parseFloat(styles.columnGap) || 0;
      const innerWidth = Math.max(280, pdfViewer.clientWidth - horizontalPadding);
      const baseWidth = Math.max(120, (innerWidth - gap * Math.max(0, currentColumns - 1)) / currentColumns);
      const pageWidth = Math.min(1800, Math.max(100, baseWidth * currentWidth * currentZoom));

      document.documentElement.style.setProperty("--page-width", `${pageWidth}px`);
      pdfViewer.style.justifyContent = currentWidth * currentZoom < 1 ? "center" : "start";
      return pageWidth;
    }

    async function loadPdf(file) {
      try {
        renderVersion += 1;
        welcome.hidden = true;
        app.hidden = false;
        pdfViewer.replaceChildren();
        status.classList.remove("error");
        status.textContent = "Carregando PDF...";
        fileName.textContent = file.name;

        if (currentDocument) {
          await currentDocument.destroy();
          currentDocument = null;
        }

        const data = new Uint8Array(await file.arrayBuffer());
        currentDocument = await pdfjsLib.getDocument({ data }).promise;
        await renderAllPages();
      } catch (error) {
        console.error(error);
        showError("Não foi possível abrir este PDF.");
      }
    }

    async function renderAllPages() {
      if (!currentDocument) return;

      const version = ++renderVersion;
      const pageWidth = calculatePageWidth();
      updateDisabledControls(true);
      pdfViewer.replaceChildren();
      status.classList.remove("error");
      status.textContent = `Renderizando 0 de ${currentDocument.numPages} páginas...`;

      try {
        for (let pageNumber = 1; pageNumber <= currentDocument.numPages; pageNumber += 1) {
          if (version !== renderVersion) return;
          await renderPage(currentDocument, pageNumber, pageWidth);
          status.textContent = `Renderizando ${pageNumber} de ${currentDocument.numPages} páginas...`;
        }

        if (version === renderVersion) {
          status.textContent = `${currentDocument.numPages} página${currentDocument.numPages === 1 ? "" : "s"} — zoom ${Math.round(currentZoom * 100)}% — largura ${Math.round(currentWidth * 100)}%.`;
        }
      } catch (error) {
        if (version !== renderVersion) return;
        console.error(error);
        showError("Não foi possível renderizar este PDF.");
      } finally {
        if (version === renderVersion) updateDisabledControls(false);
      }
    }

    async function renderPage(pdfDocument, pageNumber, pageWidth) {
      const page = await pdfDocument.getPage(pageNumber);
      const initialViewport = page.getViewport({ scale: 1 });
      const viewport = page.getViewport({ scale: Math.max(80, pageWidth - 2) / initialViewport.width });
      const outputScale = Math.min(window.devicePixelRatio || 1, 2);
      const pageContainer = document.createElement("article");
      const pageLabel = document.createElement("span");
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d", { alpha: false });

      pageContainer.className = "pdf-page";
      pageContainer.setAttribute("aria-label", `Página ${pageNumber}`);
      pageLabel.className = "page-number";
      pageLabel.textContent = `Página ${pageNumber}`;

      canvas.width = Math.floor(viewport.width * outputScale);
      canvas.height = Math.floor(viewport.height * outputScale);
      canvas.style.width = `${Math.floor(viewport.width)}px`;
      canvas.style.height = `${Math.floor(viewport.height)}px`;

      pageContainer.append(pageLabel, canvas);
      pdfViewer.appendChild(pageContainer);

      await page.render({
        canvasContext: context,
        viewport,
        transform: outputScale === 1 ? null : [outputScale, 0, 0, outputScale, 0, 0],
        background: "rgb(255, 255, 255)"
      }).promise;

      page.cleanup();
    }

    async function resetApp() {
      renderVersion += 1;
      updateDisabledControls(true);

      try {
        if (currentDocument) await currentDocument.destroy();
      } catch (error) {
        console.warn("Falha ao encerrar o PDF atual.", error);
      }

      currentDocument = null;
      pdfViewer.replaceChildren();
      status.textContent = "";
      status.classList.remove("error");
      fileName.textContent = "Nenhum arquivo";
      pdfInput.value = "";
      app.hidden = true;
      welcome.hidden = false;
      updateDisabledControls(false);
      window.scrollTo({ top: 0, behavior: "instant" });
    }

    function updateDisabledControls(rendering) {
      columnSelect.disabled = rendering;
      zoomOutButton.disabled = rendering || currentZoom <= MIN_ZOOM;
      zoomInButton.disabled = rendering || currentZoom >= MAX_ZOOM;
      widthOutButton.disabled = rendering || currentWidth <= MIN_WIDTH;
      widthInButton.disabled = rendering || currentWidth >= MAX_WIDTH;
    }

    function showError(message) {
      app.hidden = false;
      welcome.hidden = true;
      status.classList.add("error");
      status.textContent = message;
      updateDisabledControls(false);
    }
  </script>
</body>
</html>
