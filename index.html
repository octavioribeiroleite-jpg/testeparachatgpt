<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="Visualizador de PDFs para cifras, partituras e repertórios.">
  <title>CifraView — Visualizador de PDF</title>
  <style>
    :root {
      --columns: 1;
      --page-width: 100%;
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #e5e7eb;
      color: #111827;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .welcome {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.14), transparent 36%),
        #f8fafc;
    }

    .welcome-card {
      width: min(100%, 560px);
      padding: clamp(28px, 6vw, 52px);
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      background: #eff6ff;
      color: #2563eb;
      font-size: 34px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3.4rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .welcome-card p {
      margin: 18px auto 28px;
      max-width: 420px;
      color: #64748b;
      font-size: 1rem;
      line-height: 1.6;
    }

    .primary-button,
    .secondary-button {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease;
    }

    .primary-button {
      width: 100%;
      min-height: 56px;
      border: 0;
      background: #111827;
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.2);
    }

    .primary-button:hover,
    .secondary-button:hover,
    .control-button:hover {
      transform: translateY(-1px);
    }

    .primary-button:hover {
      background: #1f2937;
    }

    .privacy-note {
      margin: 20px 0 0 !important;
      color: #94a3b8 !important;
      font-size: 0.8rem !important;
    }

    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .app {
      min-height: 100vh;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(17, 24, 39, 0.96);
      color: #ffffff;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.18);
    }

    .brand {
      min-width: 0;
      flex: 1;
    }

    .brand strong,
    .brand span {
      display: block;
    }

    .brand strong {
      font-size: 1rem;
    }

    .brand span {
      margin-top: 2px;
      color: #cbd5e1;
      font-size: 0.78rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .column-control,
    .step-control {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 7px;
      border: 1px solid #4b5563;
      border-radius: 12px;
      background: #1f2937;
      color: #e5e7eb;
      font-size: 0.86rem;
      font-weight: 700;
    }

    .control-label {
      margin-right: 2px;
      color: #d1d5db;
      font-size: 0.78rem;
    }

    .column-control select {
      min-width: 56px;
      min-height: 30px;
      padding: 2px 8px;
      border: 1px solid #6b7280;
      border-radius: 8px;
      background: #111827;
      color: #ffffff;
      cursor: pointer;
    }

    .control-button {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border: 1px solid #6b7280;
      border-radius: 8px;
      background: #111827;
      color: #ffffff;
      font-size: 1.15rem;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, opacity 160ms ease;
    }

    .control-button:hover {
      background: #374151;
    }

    .control-button:disabled,
    .column-control select:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .control-value {
      min-width: 48px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .secondary-button {
      flex: 0 0 auto;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid #4b5563;
      background: #1f2937;
      color: #ffffff;
    }

    .status {
      padding: 12px 16px;
      text-align: center;
      color: #475569;
      font-weight: 600;
    }

    .status.error {
      color: #b91c1c;
    }

    .pdf-viewer {
      width: 100%;
      margin: 0;
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(var(--columns), var(--page-width));
      align-items: start;
      justify-content: start;
      gap: 14px;
      overflow-x: auto;
      overscroll-behavior-inline: contain;
      scroll-behavior: smooth;
    }

    .pdf-page {
      position: relative;
      width: var(--page-width);
      min-width: var(--page-width);
      display: flex;
      justify-content: center;
      padding: 8px;
      border-radius: 10px;
      background: #cbd5e1;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.16);
    }

    .page-number {
      position: absolute;
      top: 13px;
      left: 13px;
      z-index: 2;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.78);
      color: #ffffff;
      font-size: 0.72rem;
      font-weight: 700;
      pointer-events: none;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      background: #ffffff;
      box-shadow: 0 3px 12px rgba(15, 23, 42, 0.18);
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 1100px) {
      .toolbar {
        flex-wrap: wrap;
      }

      .brand {
        flex-basis: 100%;
      }

      .toolbar-actions {
        width: 100%;
        flex-wrap: wrap;
      }
    }

    @media (max-width: 640px) {
      .welcome {
        padding: 16px;
      }

      .welcome-card {
        border-radius: 20px;
      }

      .toolbar {
        gap: 8px;
        padding: 9px;
      }

      .toolbar-actions {
        gap: 7px;
      }

      .column-control,
      .step-control {
        flex: 1 1 145px;
        justify-content: space-between;
      }

      .secondary-button {
        width: 100%;
        padding: 0 11px;
        font-size: 0.88rem;
      }

      .status {
        padding: 8px 10px;
        font-size: 0.82rem;
      }

      .pdf-viewer {
        padding: 7px;
        gap: 7px;
      }

      .pdf-page {
        padding: 4px;
        border-radius: 7px;
      }

      .page-number {
        top: 8px;
        left: 8px;
      }
    }

    @media (orientation: landscape) and (max-height: 620px) {
      .toolbar {
        flex-wrap: nowrap;
        gap: 6px;
        padding: 6px 8px;
      }

      .brand {
        flex: 0 1 180px;
        max-width: 180px;
      }

      .brand span {
        font-size: 0.68rem;
      }

      .toolbar-actions {
        width: auto;
        flex: 1;
        flex-wrap: nowrap;
        gap: 5px;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .toolbar-actions::-webkit-scrollbar {
        display: none;
      }

      .column-control,
      .step-control {
        min-height: 38px;
        flex: 0 0 auto;
      }

      .control-label {
        display: none;
      }

      .secondary-button {
        width: auto;
        min-height: 38px;
        padding: 0 10px;
        white-space: nowrap;
      }

      .status {
        padding: 6px 8px;
        font-size: 0.75rem;
      }

      .pdf-viewer {
        padding: 6px;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <section id="welcome" class="welcome">
    <div class="welcome-card">
      <div class="icon" aria-hidden="true">♫</div>
      <h1>CifraView</h1>
      <p>Abra uma cifra ou partitura em PDF para visualizar todas as páginas.</p>

      <input id="pdf-input" type="file" accept="application/pdf,.pdf">
      <button id="open-pdf-button" class="primary-button" type="button">
        <span aria-hidden="true">📄</span>
        Abrir PDF
      </button>

      <p class="privacy-note">O arquivo permanece no seu aparelho.</p>
    </div>
  </section>

  <section id="app" class="app" hidden>
    <header class="toolbar">
      <div class="brand">
        <strong>CifraView</strong>
        <span id="file-name">Nenhum arquivo</span>
      </div>

      <div class="toolbar-actions">
        <div class="step-control" aria-label="Controle de zoom">
          <span class="control-label">Zoom</span>
          <button id="zoom-out-button" class="control-button" type="button" aria-label="Diminuir zoom" title="Diminuir zoom">−</button>
          <span id="zoom-value" class="control-value">100%</span>
          <button id="zoom-in-button" class="control-button" type="button" aria-label="Aumentar zoom" title="Aumentar zoom">+</button>
        </div>

        <div class="step-control" aria-label="Controle de largura das páginas">
          <span class="control-label">Largura</span>
          <button id="width-out-button" class="control-button" type="button" aria-label="Estreitar páginas" title="Estreitar páginas">−</button>
          <span id="width-value" class="control-value">100%</span>
          <button id="width-in-button" class="control-button" type="button" aria-label="Alargar páginas" title="Alargar páginas">+</button>
        </div>

        <label class="column-control" for="column-select">
          <span class="control-label">Colunas</span>
          <select id="column-select" aria-label="Quantidade de páginas lado a lado">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </label>

        <button id="change-pdf-button" class="secondary-button" type="button">
          Trocar PDF
        </button>
      </div>
    </header>

    <div id="status" class="status" role="status" aria-live="polite"></div>
    <main id="pdf-viewer" class="pdf-viewer" aria-label="Páginas do PDF"></main>
  </section>

  <script type="module">
    import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.mjs";

    const welcome = document.getElementById("welcome");
    const app = document.getElementById("app");
    const pdfInput = document.getElementById("pdf-input");
    const openPdfButton = document.getElementById("open-pdf-button");
    const changePdfButton = document.getElementById("change-pdf-button");
    const columnSelect = document.getElementById("column-select");
    const zoomOutButton = document.getElementById("zoom-out-button");
    const zoomInButton = document.getElementById("zoom-in-button");
    const zoomValue = document.getElementById("zoom-value");
    const widthOutButton = document.getElementById("width-out-button");
    const widthInButton = document.getElementById("width-in-button");
    const widthValue = document.getElementById("width-value");
    const fileName = document.getElementById("file-name");
    const status = document.getElementById("status");
    const pdfViewer = document.getElementById("pdf-viewer");

    const MIN_ZOOM = 0.5;
    const MAX_ZOOM = 2;
    const ZOOM_STEP = 0.1;
    const MIN_WIDTH = 0.7;
    const MAX_WIDTH = 1.8;
    const WIDTH_STEP = 0.1;

    let currentDocument = null;
    let currentColumns = 1;
    let currentZoom = 1;
    let currentWidth = 1;
    let renderVersion = 0;
    let resizeTimer = null;

    const savedColumns = Number.parseInt(localStorage.getItem("cifraview-columns"), 10);
    const savedZoom = Number.parseFloat(localStorage.getItem("cifraview-zoom"));
    const savedWidth = Number.parseFloat(localStorage.getItem("cifraview-width"));
    const defaultColumns = window.innerWidth <= 640 ? 1 : 2;

    applyColumns(Number.isInteger(savedColumns) ? savedColumns : defaultColumns, false);
    applyZoom(Number.isFinite(savedZoom) ? savedZoom : 1, false);
    applyWidth(Number.isFinite(savedWidth) ? savedWidth : 1, false);

    openPdfButton.addEventListener("click", () => pdfInput.click());
    changePdfButton.addEventListener("click", () => pdfInput.click());

    columnSelect.addEventListener("change", async () => {
      applyColumns(Number.parseInt(columnSelect.value, 10), false);
      await renderAllPages();
    });

    zoomOutButton.addEventListener("click", async () => {
      applyZoom(currentZoom - ZOOM_STEP, false);
      await renderAllPages();
    });

    zoomInButton.addEventListener("click", async () => {
      applyZoom(currentZoom + ZOOM_STEP, false);
      await renderAllPages();
    });

    widthOutButton.addEventListener("click", async () => {
      applyWidth(currentWidth - WIDTH_STEP, false);
      await renderAllPages();
    });

    widthInButton.addEventListener("click", async () => {
      applyWidth(currentWidth + WIDTH_STEP, false);
      await renderAllPages();
    });

    pdfInput.addEventListener("change", async () => {
      const file = pdfInput.files?.[0];

      if (!file) return;

      if (file.type !== "application/pdf" && !file.name.toLowerCase().endsWith(".pdf")) {
        showError("Selecione um arquivo PDF válido.");
        pdfInput.value = "";
        return;
      }

      await loadPdf(file);
      pdfInput.value = "";
    });

    window.addEventListener("resize", () => {
      window.clearTimeout(resizeTimer);
      resizeTimer = window.setTimeout(() => {
        if (currentDocument) renderAllPages();
      }, 250);
    });

    function applyColumns(value, rerender = true) {
      currentColumns = Math.min(6, Math.max(1, Number(value) || 1));
      document.documentElement.style.setProperty("--columns", currentColumns);
      columnSelect.value = String(currentColumns);
      localStorage.setItem("cifraview-columns", String(currentColumns));

      if (rerender && currentDocument) renderAllPages();
    }

    function applyZoom(value, rerender = true) {
      currentZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, Number(value) || 1));
      currentZoom = Math.round(currentZoom * 10) / 10;
      zoomValue.textContent = `${Math.round(currentZoom * 100)}%`;
      zoomOutButton.disabled = currentZoom <= MIN_ZOOM;
      zoomInButton.disabled = currentZoom >= MAX_ZOOM;
      localStorage.setItem("cifraview-zoom", String(currentZoom));

      if (rerender && currentDocument) renderAllPages();
    }

    function applyWidth(value, rerender = true) {
      currentWidth = Math.min(MAX_WIDTH, Math.max(MIN_WIDTH, Number(value) || 1));
      currentWidth = Math.round(currentWidth * 10) / 10;
      widthValue.textContent = `${Math.round(currentWidth * 100)}%`;
      widthOutButton.disabled = currentWidth <= MIN_WIDTH;
      widthInButton.disabled = currentWidth >= MAX_WIDTH;
      localStorage.setItem("cifraview-width", String(currentWidth));

      if (rerender && currentDocument) renderAllPages();
    }

    function updatePageWidth() {
      const viewerStyles = window.getComputedStyle(pdfViewer);
      const paddingLeft = Number.parseFloat(viewerStyles.paddingLeft) || 0;
      const paddingRight = Number.parseFloat(viewerStyles.paddingRight) || 0;
      const gap = Number.parseFloat(viewerStyles.columnGap) || 0;
      const innerWidth = Math.max(280, pdfViewer.clientWidth - paddingLeft - paddingRight);
      const totalGap = gap * Math.max(0, currentColumns - 1);
      const basePageWidth = Math.max(120, (innerWidth - totalGap) / currentColumns);
      const pageWidth = Math.min(1800, Math.max(100, basePageWidth * currentWidth * currentZoom));

      document.documentElement.style.setProperty("--page-width", `${pageWidth}px`);
      pdfViewer.style.justifyContent = currentWidth * currentZoom < 1 ? "center" : "start";
      return pageWidth;
    }

    async function loadPdf(file) {
      try {
        renderVersion += 1;
        welcome.hidden = true;
        app.hidden = false;
        pdfViewer.replaceChildren();
        status.classList.remove("error");
        status.textContent = "Carregando PDF...";
        fileName.textContent = file.name;

        if (currentDocument) {
          await currentDocument.destroy();
          currentDocument = null;
        }

        const fileData = new Uint8Array(await file.arrayBuffer());
        currentDocument = await pdfjsLib.getDocument({ data: fileData }).promise;
        await renderAllPages();
      } catch (error) {
        console.error(error);
        showError("Não foi possível abrir este PDF. Tente outro arquivo.");
      }
    }

    async function renderAllPages() {
      if (!currentDocument) return;

      const version = ++renderVersion;
      const pageWidth = updatePageWidth();

      setControlsDisabled(true);
      pdfViewer.replaceChildren();
      status.classList.remove("error");
      status.textContent = `Renderizando 0 de ${currentDocument.numPages} páginas...`;

      try {
        for (let pageNumber = 1; pageNumber <= currentDocument.numPages; pageNumber += 1) {
          if (version !== renderVersion) return;

          await renderPage(currentDocument, pageNumber, pageWidth);
          status.textContent = `Renderizando ${pageNumber} de ${currentDocument.numPages} páginas...`;
        }

        if (version === renderVersion) {
          status.textContent = `${currentDocument.numPages} página${currentDocument.numPages === 1 ? "" : "s"} — zoom ${Math.round(currentZoom * 100)}% — largura ${Math.round(currentWidth * 100)}%.`;
        }
      } catch (error) {
        console.error(error);
        showError("Não foi possível renderizar este PDF.");
      } finally {
        if (version === renderVersion) setControlsDisabled(false);
      }
    }

    async function renderPage(pdfDocument, pageNumber, pageWidth) {
      const page = await pdfDocument.getPage(pageNumber);
      const initialViewport = page.getViewport({ scale: 1 });
      const availableWidth = Math.max(80, pageWidth - 16);
      const scale = availableWidth / initialViewport.width;
      const viewport = page.getViewport({ scale });
      const outputScale = Math.min(window.devicePixelRatio || 1, 2);

      const pageContainer = document.createElement("article");
      pageContainer.className = "pdf-page";
      pageContainer.setAttribute("aria-label", `Página ${pageNumber}`);

      const pageLabel = document.createElement("span");
      pageLabel.className = "page-number";
      pageLabel.textContent = `Página ${pageNumber}`;

      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d", { alpha: false });

      canvas.width = Math.floor(viewport.width * outputScale);
      canvas.height = Math.floor(viewport.height * outputScale);
      canvas.style.width = `${Math.floor(viewport.width)}px`;
      canvas.style.height = `${Math.floor(viewport.height)}px`;

      pageContainer.append(pageLabel, canvas);
      pdfViewer.appendChild(pageContainer);

      await page.render({
        canvasContext: context,
        viewport,
        transform: outputScale === 1 ? null : [outputScale, 0, 0, outputScale, 0, 0],
        background: "rgb(255, 255, 255)"
      }).promise;

      page.cleanup();
    }

    function setControlsDisabled(disabled) {
      columnSelect.disabled = disabled;
      zoomOutButton.disabled = disabled || currentZoom <= MIN_ZOOM;
      zoomInButton.disabled = disabled || currentZoom >= MAX_ZOOM;
      widthOutButton.disabled = disabled || currentWidth <= MIN_WIDTH;
      widthInButton.disabled = disabled || currentWidth >= MAX_WIDTH;
    }

    function showError(message) {
      app.hidden = false;
      welcome.hidden = true;
      status.classList.add("error");
      status.textContent = message;
      setControlsDisabled(false);
    }
  </script>
</body>
</html>
