name: Aplicar integração PWA

on:
  push:
    paths:
      - .github/workflows/apply-pwa.yml
      - scripts/apply-pwa.py
      - scripts/apply-update-button.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Aplicar recursos do PWA
        run: |
          python scripts/apply-pwa.py
          python scripts/apply-update-button.py

      - name: Salvar integração
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Nenhuma alteração necessária."
          else
            git commit -m "Integrar botão permanente de atualização"
            git push
          fi
